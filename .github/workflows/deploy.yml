name: Deploy to Firebase
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
        working-directory: admin
      - name: Build
        run: npm run build
        working-directory: admin
      - name: Deploy to Firebase
        run: npx firebase-tools@latest deploy --only hosting --project amtaf-tcg --non-interactive --force --token "${{ secrets.FIREBASE_TOKEN }}"